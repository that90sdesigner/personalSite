backend:
  name: github
  repo: that90sdesigner/personalSite
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

local_backend: true
publish_mode: editorial_workflow
media_folder: public/post-images
public_folder: /post-images

site_url: https://shankarux.com
display_url: https://shankarux.com
logo_url: /logotype_shankar.svg

collections:
  - name: writing
    label: Writing
    label_singular: Post
    folder: src/data/writing
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} - {{pubDate}}"
    editor:
      preview: false
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Description
        name: desc
        widget: string
        required: false
      - label: Publish date
        name: pubDate
        widget: datetime
        date_format: MMM D, YYYY
        time_format: false
        format: MMM D, YYYY
        required: true
      - label: Body
        name: body
        widget: markdown
        required: true
